<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB347"/>
      <stop offset="100%" style="stop-color:#FF6B6B"/>
    </linearGradient>
  </defs>
  <!-- 背景の角丸四角 -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- 鉛筆の本体 -->
  <g transform="translate(256,256) rotate(-45) translate(-256,-256)">
    <!-- 鉛筆の軸 -->
    <rect x="180" y="120" width="60" height="240" rx="6" fill="#FFE066"/>
    <rect x="200" y="120" width="20" height="240" fill="#FFD93D"/>
    <!-- 鉛筆の先端 -->
    <polygon points="180,360 240,360 210,420" fill="#F5D6A7"/>
    <polygon points="200,380 220,380 210,420" fill="#333"/>
    <!-- 鉛筆の消しゴム部分 -->
    <rect x="175" y="100" width="70" height="30" rx="6" fill="#FF8A8A"/>
    <rect x="175" y="120" width="70" height="8" fill="#DDD"/>
  </g>
  <!-- 星 -->
  <polygon points="390,100 400,130 432,130 406,150 416,180 390,162 364,180 374,150 348,130 380,130" fill="#FFE066" opacity="0.9"/>
  <polygon points="120,380 128,400 150,400 132,414 140,436 120,422 100,436 108,414 90,400 112,400" fill="#FFE066" opacity="0.8"/>
</svg>
